<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌌 ChatGPT TOTP • SHA-256</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #020108);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            max-width: 500px;
            width: 100%;
            background: rgba(10, 15, 30, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid #2a5a9c;
            border-radius: 48px;
            padding: 36px 28px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.8), 0 0 30px #3f6bc0;
            color: #e3f0ff;
        }
        h1 {
            font-weight: 400;
            font-size: 2.2rem;
            letter-spacing: 4px;
            text-align: center;
            margin-bottom: 8px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #a0c0ff, #d0e0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px #3b77e6;
        }
        .subhead {
            text-align: center;
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 20px;
            border-bottom: 1px dashed #3d6192;
            padding-bottom: 15px;
        }
        .code-container {
            background: rgba(0,5,20,0.5);
            border-radius: 60px;
            padding: 25px 20px;
            border: 1px solid #2e5688;
            box-shadow: inset 0 0 30px #1f3a66;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .timer-ring {
            display: flex;
            justify-content: center;
            margin-bottom: 10px;
        }
        .timer-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: conic-gradient(#6ea8fe 0deg, #0a1a2f 0deg);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px #2b5797, inset 0 0 10px #000;
            border: 2px solid #a1c2ff;
        }
        .timer-text {
            font-size: 1.8rem;
            font-weight: 600;
            color: #ebf5ff;
            text-shadow: 0 0 15px #8ab2ff;
            background: #00000040;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .totp-display {
            font-size: 5.5rem;
            font-weight: 800;
            letter-spacing: 16px;
            margin: 15px 0 5px;
            color: #d4edff;
            text-shadow: 0 0 25px #3d9dff;
            font-variant-numeric: tabular-nums;
            background: #02102430;
            padding: 5px 25px;
            border-radius: 60px;
            border: 1px solid #3680dd;
        }
        .copy-btn {
            background: rgba(20,60,120,0.8);
            border: 1px solid #5f9eff;
            color: #fff;
            padding: 14px 28px;
            font-size: 1.4rem;
            border-radius: 60px;
            backdrop-filter: blur(10px);
            cursor: pointer;
            margin: 15px 0 10px;
            font-weight: 600;
            letter-spacing: 2px;
            box-shadow: 0 5px 15px #00000050, 0 0 15px #1e4d9c;
            transition: 0.2s;
            min-width: 200px;
        }
        .copy-btn:hover {
            background: #2a6fc9;
            box-shadow: 0 0 25px #3e8aff;
        }
        .settings {
            margin-top: 25px;
            border-top: 1px solid #2e5688;
            padding-top: 20px;
        }
        .param-row {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            gap: 10px;
            flex-wrap: wrap;
        }
        .param-row label {
            width: 100px;
            font-weight: 500;
        }
        input, select {
            background: #030c1c;
            border: 1px solid #3c6eb4;
            border-radius: 30px;
            padding: 10px 16px;
            color: #c3dcff;
            font-size: 1rem;
            outline: none;
        }
        .secret-input-group {
            display: flex;
            gap: 8px;
            flex: 1;
        }
        .secret-input {
            flex: 1;
            font-family: monospace;
        }
        .set-btn {
            background: #0e2e5a;
            border: 1px solid #5e96e0;
            color: white;
            border-radius: 40px;
            padding: 10px 22px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }
        .set-btn:hover {
            background: #1f509e;
        }
        .info-panel {
            background: #0a142e80;
            border-radius: 20px;
            padding: 15px;
            margin: 20px 0;
            font-size: 0.9rem;
            border: 1px solid #2e5a9c;
        }
        .error-message {
            color: #ffb0a0;
            background: #4a1e1e80;
            padding: 8px 16px;
            border-radius: 30px;
            margin-top: 8px;
            border-left: 4px solid #ff6b6b;
        }
        .success-message {
            color: #a0ffb0;
            background: #1e4a1e80;
            padding: 8px 16px;
            border-radius: 30px;
            border-left: 4px solid #6bff6b;
        }
        .warning {
            margin-top: 20px;
            padding: 12px;
            background: #f7e05e20;
            border-radius: 30px;
            border-left: 5px solid #ffd966;
            font-size: 0.8rem;
        }
        .footer-note {
            margin-top: 15px;
            text-align: right;
            opacity: 0.6;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🌠 CHATGPT OTP</h1>
    <div class="subhead">SHA-256 • 6 цифр • 30 сек</div>

    <div class="code-container">
        <div class="timer-ring">
            <div class="timer-circle" id="timerCircle">
                <div class="timer-text" id="timerText">30</div>
            </div>
        </div>
        <div class="totp-display" id="totpDisplay">------</div>
        <button class="copy-btn" id="copyBtn">📋 КОПИРОВАТЬ</button>
    </div>

    <div class="info-panel">
        <div style="display: flex; justify-content: space-between;">
            <span>🕒 Unix время:</span>
            <span id="unixTimeDisplay">—</span>
        </div>
        <div style="display: flex; justify-content: space-between; margin-top: 5px;">
            <span>🔑 Нормализованный ключ:</span>
            <span id="normalizedKeyDisplay" style="font-family: monospace;">—</span>
        </div>
        <div style="margin-top: 10px; font-size:0.85rem;" id="syncStatus"></div>
    </div>

    <div class="settings">
        <div class="param-row">
            <label>🔐 Секрет:</label>
            <div class="secret-input-group">
                <input type="text" id="secretInput" class="secret-input" placeholder="Base32 ключ" spellcheck="false">
                <button class="set-btn" id="setSecretBtn">Применить</button>
            </div>
        </div>
        <div class="param-row">
            <label>⚙️ Алгоритм:</label>
            <select id="algorithmSelect">
                <option value="SHA-1">SHA-1 (Google)</option>
                <option value="SHA-256" selected>SHA-256 (ChatGPT/OpenAI)</option>
                <option value="SHA-512">SHA-512</option>
            </select>
        </div>
        <button class="set-btn" id="checkSyncBtn" style="width:100%;">🔄 Проверить синхронизацию времени</button>
    </div>

    <div id="messageArea"></div>

    <div class="warning">
        <strong>⚠️ Вы приняли риск:</strong> секрет виден в URL. Только для тестовых / личных аккаунтов.
    </div>
    <div class="footer-note">🛸 Встроенный TOTP • ChatGPT Edition</div>
</div>

<script>
(function(){
    "use strict";

    // ---------- Base32 декодер (RFC 4648) ----------
    const base32Chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
    function base32Decode(str) {
        str = str.toUpperCase().replace(/[^A-Z2-7]/g, '');
        let bits = '';
        for (let i = 0; i < str.length; i++) {
            const val = base32Chars.indexOf(str[i]);
            if (val === -1) continue;
            bits += val.toString(2).padStart(5, '0');
        }
        const bytes = [];
        for (let i = 0; i + 8 <= bits.length; i += 8) {
            bytes.push(parseInt(bits.substr(i, 8), 2));
        }
        return new Uint8Array(bytes);
    }

    // ---------- HOTP / TOTP реализация ----------
    async function generateTOTP(secretBase32, algorithm = 'SHA-256', period = 30, digits = 6) {
        const key = base32Decode(secretBase32);
        const time = Math.floor(Date.now() / 1000);
        const counter = Math.floor(time / period);
        
        // counter в 8 байт big-endian
        const counterBytes = new Uint8Array(8);
        for (let i = 7; i >= 0; i--) {
            counterBytes[i] = counter & 0xFF;
            counter = Math.floor(counter / 256);
        }

        // HMAC с выбранным алгоритмом
        let hashAlgo = 'SHA-256';
        if (algorithm === 'SHA-1') hashAlgo = 'SHA-1';
        else if (algorithm === 'SHA-512') hashAlgo = 'SHA-512';
        
        const cryptoKey = await crypto.subtle.importKey(
            'raw',
            key,
            { name: 'HMAC', hash: hashAlgo },
            false,
            ['sign']
        );
        const signature = await crypto.subtle.sign('HMAC', cryptoKey, counterBytes);
        const hmac = new Uint8Array(signature);

        // Динамическое усечение (Dynamic Truncation)
        const offset = hmac[hmac.length - 1] & 0x0F;
        const binary = 
            ((hmac[offset] & 0x7F) << 24) |
            ((hmac[offset + 1] & 0xFF) << 16) |
            ((hmac[offset + 2] & 0xFF) << 8) |
            (hmac[offset + 3] & 0xFF);
        
        const otp = binary % (10 ** digits);
        return otp.toString().padStart(digits, '0');
    }

    // ---------- DOM элементы ----------
    const totpDisplay = document.getElementById('totpDisplay');
    const timerText = document.getElementById('timerText');
    const timerCircle = document.getElementById('timerCircle');
    const copyBtn = document.getElementById('copyBtn');
    const secretInput = document.getElementById('secretInput');
    const setSecretBtn = document.getElementById('setSecretBtn');
    const algorithmSelect = document.getElementById('algorithmSelect');
    const checkSyncBtn = document.getElementById('checkSyncBtn');
    const unixTimeDisplay = document.getElementById('unixTimeDisplay');
    const normalizedKeyDisplay = document.getElementById('normalizedKeyDisplay');
    const syncStatus = document.getElementById('syncStatus');
    const messageArea = document.getElementById('messageArea');

    let currentSecretRaw = '';
    let currentNormalized = '';
    let intervalId = null;
    let currentCode = '';

    // Нормализация (0→O, 1→I, убираем пробелы)
    function normalizeSecret(raw) {
        let cleaned = raw.toUpperCase().replace(/[\s\-_]+/g, '');
        cleaned = cleaned.replace(/0/g, 'O').replace(/1/g, 'I');
        return cleaned;
    }

    function validateBase32(str) {
        return /^[A-Z2-7]+$/.test(str);
    }

    // Обновление UI и генерация кода
    async function updateUI() {
        const now = Math.floor(Date.now() / 1000);
        const period = 30;
        const remaining = period - (now % period);
        const progress = (remaining / period) * 360;

        timerText.textContent = remaining;
        timerCircle.style.background = `conic-gradient(#6ea8fe ${progress}deg, #0a1a2f ${progress}deg)`;
        unixTimeDisplay.textContent = now;

        if (currentNormalized && validateBase32(currentNormalized)) {
            try {
                const algo = algorithmSelect.value;
                const code = await generateTOTP(currentNormalized, algo, 30, 6);
                currentCode = code;
                totpDisplay.textContent = code;
                normalizedKeyDisplay.textContent = currentNormalized;
                hideMessage();
            } catch (e) {
                totpDisplay.textContent = 'ERROR';
                currentCode = '';
                showMessage('Ошибка генерации: ' + e.message, 'error');
            }
        } else {
            totpDisplay.textContent = '------';
            currentCode = '';
            normalizedKeyDisplay.textContent = currentNormalized || '—';
            if (currentSecretRaw) showMessage('Некорректный Base32 ключ', 'error');
        }
    }

    function startUpdater() {
        if (intervalId) clearInterval(intervalId);
        updateUI();
        intervalId = setInterval(updateUI, 1000);
    }

    function setSecret(raw) {
        currentSecretRaw = raw.trim();
        currentNormalized = normalizeSecret(currentSecretRaw);
        secretInput.value = currentSecretRaw;
        
        // Обновить URL
        const url = new URL(window.location);
        if (currentSecretRaw) url.searchParams.set('secret', currentSecretRaw);
        else url.searchParams.delete('secret');
        window.history.replaceState({}, '', url);

        if (!validateBase32(currentNormalized)) {
            showMessage('Ключ содержит недопустимые символы после замены 0→O, 1→I', 'error');
        } else {
            showMessage('Ключ валиден. Генерация...', 'success');
        }
        startUpdater();
    }

    // Проверка времени
    async function checkTimeSync() {
        try {
            const res = await fetch('https://worldtimeapi.org/api/timezone/Etc/UTC');
            const data = await res.json();
            const serverUnix = Math.floor(new Date(data.utc_datetime).getTime() / 1000);
            const localUnix = Math.floor(Date.now() / 1000);
            const diff = localUnix - serverUnix;
            let msg = `Сервер UTC: ${serverUnix}. Локальное: ${localUnix}. Разница: ${diff} сек. `;
            if (Math.abs(diff) > 30) msg += '⚠️ Сильное расхождение! Синхронизируйте часы.';
            else if (Math.abs(diff) > 5) msg += '⚠️ Небольшое расхождение.';
            else msg += '✅ Время синхронизировано.';
            syncStatus.textContent = msg;
        } catch(e) {
            syncStatus.textContent = '❌ Ошибка проверки времени.';
        }
    }

    function showMessage(text, type) {
        messageArea.innerHTML = `<div class="${type==='error'?'error-message':'success-message'}">${text}</div>`;
    }
    function hideMessage() { messageArea.innerHTML = ''; }

    // Инициализация из URL
    function initFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const sec = params.get('secret');
        if (sec) {
            secretInput.value = sec;
            setSecret(sec);
        } else {
            currentSecretRaw = '';
            currentNormalized = '';
            startUpdater();
        }
        const algo = params.get('algo');
        if (algo) algorithmSelect.value = algo;
    }

    // Обработчики
    setSecretBtn.addEventListener('click', ()=>{
        setSecret(secretInput.value);
    });
    secretInput.addEventListener('keypress', (e)=>{
        if(e.key==='Enter') setSecret(secretInput.value);
    });
    algorithmSelect.addEventListener('change', ()=>{
        if (currentNormalized) startUpdater();
        // обновить URL с algo параметром
        const url = new URL(window.location);
        url.searchParams.set('algo', algorithmSelect.value);
        window.history.replaceState({}, '', url);
    });
    checkSyncBtn.addEventListener('click', checkTimeSync);
    copyBtn.addEventListener('click', ()=>{
        if (!currentCode || currentCode==='ERROR' || currentCode==='------') {
            alert('Нет кода для копирования');
            return;
        }
        navigator.clipboard.writeText(currentCode).then(()=>{
            copyBtn.textContent='✅ СКОПИРОВАНО!';
            setTimeout(()=>copyBtn.textContent='📋 КОПИРОВАТЬ',1500);
        }).catch(()=>alert('Ошибка копирования'));
    });

    window.addEventListener('beforeunload', ()=> clearInterval(intervalId));

    // Старт
    initFromUrl();
    checkTimeSync();

    // Для отладки: если URL уже содержит ваш ключ, он автоматически применится.
    // Пример: ?secret=IXASK3D4TJ2O5JVHZK6K6S6J6IG4XJXY&algo=SHA-256
})();
</script>
</body>
</html>
